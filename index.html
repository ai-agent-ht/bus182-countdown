<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leung's Bus Infoboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #0f172a;
    color: #f1f5f9;
    min-height: 100vh;
    padding: 16px 20px;
  }
  .container { width: 100%; max-width: 440px; }

  /* --- Title Banner --- */
  .title-banner {
    text-align: center;
    margin-bottom: 10px;
    padding-bottom: 10px;
    border-bottom: 1px solid #1e293b;
  }
  .title-banner .big-bus {
    font-size: 48px;
    display: block;
    line-height: 1;
  }
  .title-banner h2 {
    font-size: 18px;
    font-weight: 600;
    color: #94a3b8;
    margin-top: -4px;
    letter-spacing: 1px;
  }

  /* --- Tab Bar --- */
  .tab-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .tab-bar .tab {
    flex: 1;
    padding: 10px 0;
    text-align: center;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    background: #1e293b;
    color: #64748b;
    transition: all 0.2s;
    border: none;
  }
  .tab-bar .tab.active {
    background: #eab308;
    color: #0f172a;
  }

  /* --- Stop Header --- */
  .stop-name { text-align: center; margin-bottom: 14px; }
  .stop-name .badge { font-size: 14px; color: #94a3b8; }
  .stop-name h1 { font-size: 24px; font-weight: 700; margin-top: 2px; }
  .stop-name .clock { font-size: 32px; color: #64748b; margin-top: 4px; font-variant-numeric: tabular-nums; font-weight: 700; }

  @media (prefers-color-scheme: light) {
    .title-banner { border-bottom-color: #e2e8f0; }
    .title-banner h2 { color: #64748b; }
  }

  /* --- Bus List --- */
  .bus-list { display: flex; flex-direction: column; gap: 10px; }
  .bus-row {
    background: #1e293b;
    border-radius: 16px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .bus-row .route-tag {
    color: #fff;
    font-size: 24px;
    font-weight: 800;
    padding: 6px 12px;
    border-radius: 10px;
    min-width: 56px;
    text-align: center;
    flex-shrink: 0;
    letter-spacing: 1px;
  }
  /* Route-specific tag colors */
  .bus-row .route-tag.r182 { background: #06b6d4; }
  .bus-row .route-tag.r113 { background: #f97316; }
  .bus-row .route-tag.r109 { background: #8b5cf6; }
  .bus-row .dest-info { flex: 1; min-width: 0; }
  .bus-row .dest-info .dest {
    font-size: 16px;
    font-weight: 600;
  }
  .bus-row .dest-info .dest-sub {
    font-size: 13px;
    color: #64748b;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .bus-row .eta { text-align: right; flex-shrink: 0; }
  .bus-row .eta .num {
    font-size: 42px;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .bus-row .eta .num .unit { font-size: 16px; font-weight: 600; margin-left: 2px; }
  .bus-row .eta .num.due    { color: #ef4444; }
  .bus-row .eta .num.near   { color: #eab308; }
  .bus-row .eta .num.far    { color: #22c55e; }
  .bus-row .eta .num.away   { color: #60a5fa; }
  .bus-row .eta .num.arriving { color: #ef4444; font-size: 20px; }
  .bus-row .eta .num.none   { color: #475569; font-size: 18px; }
  .bus-row .eta .tag {
    font-size: 9px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 3px;
    display: inline-block;
    margin-top: 2px;
  }
  .bus-row .eta .tag.final { background: #eab308; color: #0f172a; }

  /* --- Weather --- */
  .weather-card {
    background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
    border-radius: 20px;
    padding: 18px 22px;
    margin-top: 16px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .weather-card .w-icon {
    width: 72px;
    text-align: center;
    flex-shrink: 0;
  }
  .weather-card .w-icon img {
    width: 64px;
    height: 64px;
    display: block;
  }
  .weather-card .w-info { flex: 1; }
  .weather-card .w-temp {
    font-size: 40px;
    font-weight: 700;
    line-height: 1;
  }
  .weather-card .w-temp .deg {
    font-size: 24px;
    font-weight: 400;
    color: #94a3b8;
  }
  .weather-card .w-desc {
    font-size: 18px;
    color: #94a3b8;
    margin-top: 2px;
  }
  .weather-card .w-humidity {
    font-size: 16px;
    color: #64748b;
    margin-top: 2px;
  }
  .weather-card .w-warning {
    margin-top: 8px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .weather-card .w-warning .badge {
    font-size: 13px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 5px;
    display: inline-block;
  }
  .weather-card .w-warning .badge.tc    { background: #ef4444; color: #fff; }
  .weather-card .w-warning .badge.rain  { background: #eab308; color: #0f172a; }
  .weather-card .w-warning .badge.hot   { background: #f97316; color: #fff; }
  .weather-card .w-warning .badge.cold  { background: #60a5fa; color: #0f172a; }
  .weather-card .w-warning .badge.other { background: #64748b; color: #fff; }

  .status-bar {
    text-align: center;
    margin-top: 12px;
    font-size: 11px;
    color: #475569;
    display: flex;
    justify-content: center;
    gap: 12px;
  }
  .error-msg { text-align: center; padding: 40px 20px; color: #ef4444; }
  .error-msg button {
    margin-top: 12px; padding: 10px 28px; border-radius: 12px;
    border: none; background: #eab308; color: #0f172a;
    font-weight: 700; font-size: 16px; cursor: pointer;
  }
  .loading { text-align: center; padding: 60px 0; color: #64748b; }
  .loading .spinner {
    width: 48px; height: 48px;
    border: 4px solid #1e293b; border-top-color: #eab308;
    border-radius: 50%; animation: spin 0.8s linear infinite;
    margin: 0 auto 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (prefers-color-scheme: light) {
    body { background: #f8fafc; color: #0f172a; }
    .bus-row { background: #ffffff; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .tab-bar .tab { background: #e2e8f0; color: #64748b; }
    .tab-bar .tab.active { background: #eab308; color: #0f172a; }
    .weather-card { background: linear-gradient(135deg, #dbeafe 0%, #f0f9ff 100%); }
    .loading .spinner { border-color: #e2e8f0; border-top-color: #eab308; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="title-banner">
    <span class="big-bus">🚏</span>
    <h2>Leung's Bus Infoboard</h2>
  </div>

  <div class="tab-bar" id="tabBar">
    <button class="tab active" data-tab="morning">🌅 上午</button>
    <button class="tab" data-tab="afternoon">🌆 下午</button>
  </div>

  <div class="stop-name">
    <div class="badge">🚏</div>
    <h1 id="stopName">醫療輔助總部</h1>
    <div class="clock" id="clock">--:--:--</div>
  </div>

  <div id="app">
    <div class="loading">
      <div class="spinner"></div>
      <div>正在獲取到站資料...</div>
    </div>
  </div>

  <div id="weather"></div>

  <div class="status-bar">
    <span id="status">載入中</span>
    <span>數據: data.gov.hk + HKO</span>
  </div>
</div>

<script>
const BUS_API = 'https://data.etabus.gov.hk/v1/transport/kmb';
const WTH_API = 'https://data.weather.gov.hk/weatherAPI/opendata/weather.php';
const HKTZ = 'Asia/Hong_Kong';
const MAX_BUSES_PER_ROUTE = 2;

// --- Tab configs ---
const TABS = {
  morning: {
    label: '🌅 上午',
    stopName: '醫療輔助總部',
    routes: [
      { num: '182', destTc: '中環(港澳碼頭)', destEn: 'CENTRAL (MACAO FERRY)', dir: 'O', stopId: '66C6FDFC88F56E51' },
      { num: '113', destTc: '堅尼地城(卑路乍灣)', destEn: 'KENNEDY TOWN (BELCHER BAY)', dir: 'O', stopId: '66C6FDFC88F56E51' },
    ],
  },
  afternoon: {
    label: '🌆 下午',
    stopName: '皇后像廣場',
    routes: [
      { num: '109', destTc: '何文田', destEn: 'HO MAN TIN', dir: 'I', stopId: 'C0B0B597A9C896F7' },
      { num: '113', destTc: '彩虹', destEn: 'CHOI HUNG', dir: 'I', stopId: 'C0B0B597A9C896F7' },
      { num: '182', destTc: '愉翠苑', destEn: 'YU CHUI COURT', dir: 'I', stopId: 'A9069A17B1474D76' },
    ],
  },
};

let activeTab = 'morning';
let cachedETAs = {};

const WTH_DESC = {
  50: '晴', 51: '間有陽光', 52: '短暫陽光', 53: '多雲',
  54: '微雨', 55: '有雨', 56: '大雨', 57: '雷暴',
  58: '雷暴+大雨', 59: '有雨+狂風',
  60: '晴 (夜)', 61: '間有陽光 (夜)', 62: '短暫陽光 (夜)', 63: '多雲 (夜)',
  64: '微雨 (夜)', 65: '有雨 (夜)', 66: '大雨 (夜)', 67: '雷暴 (夜)',
  68: '雷暴+大雨 (夜)', 69: '有雨+狂風 (夜)',
};

function $(id) { return document.getElementById(id); }

// --- Tab switching ---
function switchTab(tabName) {
  activeTab = tabName;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tabName));
  $('stopName').textContent = TABS[tabName].stopName;
  updateAll();
}

document.getElementById('tabBar').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (tab && tab.dataset.tab !== activeTab) switchTab(tab.dataset.tab);
});

// --- Weather ---
async function fetchWeather() {
  const resp = await fetch(`${WTH_API}?dataType=rhrread&lang=tc`);
  return await resp.json();
}

function renderWeather(d) {
  const kcTemp = d.temperature?.data?.find(t => t.place === 'Kowloon City');
  const temp = kcTemp?.value ?? d.temperature?.data?.[0]?.value ?? '--';
  const hum = d.humidity?.data?.[0];
  const humStr = hum ? `${hum.value}%` : '';
  const icon = d.icon?.[0];
  const iconUrl = icon ? `https://www.weather.gov.hk/images/HKOWxIconOutline/pic${icon}.png` : '';
  const desc = WTH_DESC[icon] || '';
  const warnings = d.warningMessage || [];
  const tcm = d.tcmessage || [];

  const hasActiveTC = warnings.some(w =>
    w.includes('熱帶氣旋') || w.includes('Cyclone') || w.includes('Signal')
  );

  let wHtml = '';
  for (const w of warnings) {
    const cls = w.includes('熱帶氣旋') || w.includes('Cyclone') ? 'tc' :
                w.includes('雷暴') || w.includes('Thunderstorm') || w.includes('rain') ? 'rain' :
                w.includes('酷熱') || w.includes('Hot') ? 'hot' :
                w.includes('寒冷') || w.includes('Cold') ? 'cold' : 'other';
    let label = '';
    if (w.includes('熱帶氣旋') || w.includes('Cyclone')) label = '🌀 No.1';
    else if (w.includes('雷暴') || w.includes('Thunderstorm')) label = '⛈️ 雷暴';
    else if (w.includes('酷熱') || w.includes('Hot')) label = '🔥 酷熱';
    else if (w.includes('寒冷') || w.includes('Cold')) label = '❄️ 寒冷';
    else if (w.includes('暴雨') || w.includes('rain')) label = '🌧️ 暴雨';
    else label = w.split(/[。！]/)[0].trim().slice(0, 20) || w;
    wHtml += `<span class="badge ${cls}">${label}</span>`;
  }
  if (hasActiveTC) {
    for (const t of tcm) {
      const sigMatch = t.match(/信號[０-９]*號/);
      const sig = sigMatch ? sigMatch[0] : '';
      wHtml += `<span class="badge tc">🌀 ${sig || 'TC'}</span>`;
    }
  }

  $('weather').innerHTML = `
    <div class="weather-card">
      <div class="w-icon">${iconUrl ? `<img src="${iconUrl}" alt="${desc}">` : '🌡️'}</div>
      <div class="w-info">
        <div class="w-temp">${temp}<span class="deg">°C</span></div>
        <div class="w-desc">${desc}</div>
        ${humStr ? `<div class="w-humidity">濕度 ${humStr}</div>` : ''}
        ${wHtml ? `<div class="w-warning">${wHtml}</div>` : ''}
      </div>
    </div>`;
}

// --- Buses ---
function formatETA(etaStr) {
  if (!etaStr) return null;
  const now = new Date();
  const eta = new Date(etaStr);
  const diffSec = Math.floor((eta - now) / 1000);
  if (diffSec < -120) return { text: '已開出', cls: 'departed' };
  if (diffSec <= 60) return { text: '即將到站', cls: 'arriving' };
  const mins = Math.floor(diffSec / 60);
  const cls = mins <= 2 ? 'due' : mins <= 5 ? 'near' : mins <= 10 ? 'far' : 'away';
  const txt = mins >= 10 ? `${mins}` : `${mins}:${String(diffSec % 60).padStart(2, '0')}`;
  return { text: txt, cls, unit: '分鐘' };
}

function renderBuses(allETAs) {
  const app = $('app');
  let html = '<div class="bus-list">';

  const cfg = TABS[activeTab];
  const allUpcoming = [];

  for (const rt of cfg.routes) {
    const routeETAs = (allETAs[rt.num] || [])
      .filter(e => e.dir === rt.dir);

    const isFinalRoute = routeETAs.some(e =>
      (e.rmk_en && e.rmk_en.toLowerCase().includes('final')) ||
      (e.rmk_tc && e.rmk_tc.includes('最後班次'))
    );

    for (const e of routeETAs) {
      const f = formatETA(e.eta);
      if (!f) continue;
      if (f.cls === 'departed') continue;
      allUpcoming.push({
        route: rt.num,
        destTc: rt.destTc,
        destEn: rt.destEn,
        etaStr: e.eta,
        etaNum: f,
        isFinal: isFinalRoute && e.eta_seq === 1,
      });
      if (allUpcoming.length >= MAX_BUSES_PER_ROUTE * cfg.routes.length) break;
    }
  }

  allUpcoming.sort((a, b) => new Date(a.etaStr) - new Date(b.etaStr));

  if (allUpcoming.length === 0) {
    html += '<div class="bus-row"><div class="eta"><div class="num none" style="text-align:center;width:100%">🌙 沒有班次</div></div></div>';
  } else {
    for (const u of allUpcoming) {
      html += `<div class="bus-row">
        <div class="route-tag r${u.route}">${u.route}</div>
        <div class="dest-info">
          <div class="dest">${u.destTc}</div>
          <div class="dest-sub">${u.destEn}</div>
        </div>
        <div class="eta">
          <div class="num ${u.etaNum.cls}">
            ${u.etaNum.text}
            ${u.etaNum.unit ? `<span class="unit">${u.etaNum.unit}</span>` : ''}
          </div>
          ${u.isFinal ? '<div class="tag final">🚌 尾班車</div>' : ''}
        </div>
      </div>`;
    }
  }

  html += '</div>';
  app.innerHTML = html;
}

async function fetchBusETA(stopId, route) {
  const resp = await fetch(`${BUS_API}/eta/${stopId}/${route}/${1}`);
  const data = await resp.json();
  return data.data || [];
}

async function updateAll() {
  try {
    $('status').textContent = '更新中...';
    const cfg = TABS[activeTab];
    const fetches = cfg.routes.map(rt => fetchBusETA(rt.stopId, rt.num));
    const results = await Promise.all([...fetches, fetchWeather()]);
    const weather = results[results.length - 1];

    const etaMap = {};
    cfg.routes.forEach((rt, i) => { etaMap[rt.num] = results[i]; });
    cachedETAs = etaMap;

    renderWeather(weather);
    renderBuses(cachedETAs);

    const now = new Date();
    $('status').textContent = '✓ ' + now.toLocaleTimeString('zh-HK', {
      timeZone: HKTZ, hour: '2-digit', minute: '2-digit', hour12: false
    });
  } catch (e) {
    $('status').textContent = '❌ 錯誤';
    console.error(e);
  }
}

function tickCountdown() {
  renderBuses(cachedETAs);
}

function updateClock() {
  const now = new Date();
  $('clock').textContent = '🕐 ' + now.toLocaleTimeString('zh-HK', {
    timeZone: HKTZ, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
  });
}

async function init() {
  await updateAll();
  setInterval(updateAll, 30000);
  setInterval(tickCountdown, 5000);
  setInterval(updateClock, 1000);
  updateClock();
}

init();
</script>
</body>
</html>
