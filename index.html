<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>巴士到站 - 醫療輔助總部</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #0f172a;
    color: #f1f5f9;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container { width: 100%; max-width: 440px; }

  .stop-name { text-align: center; margin-bottom: 28px; }
  .stop-name .badge { font-size: 12px; color: #94a3b8; letter-spacing: 1px; }
  .stop-name h1 { font-size: 22px; font-weight: 700; margin-top: 4px; }
  .stop-name .clock { font-size: 14px; color: #64748b; margin-top: 4px; font-variant-numeric: tabular-nums; }

  .bus-list { display: flex; flex-direction: column; gap: 8px; }
  .bus-row {
    background: #1e293b;
    border-radius: 16px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .bus-row .route-tag {
    background: #eab308;
    color: #0f172a;
    font-size: 22px;
    font-weight: 800;
    padding: 4px 12px;
    border-radius: 10px;
    letter-spacing: 1px;
    flex-shrink: 0;
    min-width: 56px;
    text-align: center;
  }
  .bus-row .route-tag.late {
    background: #475569;
    color: #94a3b8;
  }
  .bus-row .dest-info { flex: 1; min-width: 0; }
  .bus-row .dest-info .dest {
    font-size: 15px;
    font-weight: 600;
  }
  .bus-row .dest-info .dest-sub {
    font-size: 11px;
    color: #64748b;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .bus-row .eta {
    text-align: right;
    flex-shrink: 0;
  }
  .bus-row .eta .num {
    font-size: 40px;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .bus-row .eta .num .unit { font-size: 16px; font-weight: 600; margin-left: 2px; }
  .bus-row .eta .num.due    { color: #22c55e; }
  .bus-row .eta .num.near   { color: #eab308; }
  .bus-row .eta .num.far    { color: #60a5fa; }
  .bus-row .eta .num.arriving { color: #22c55e; font-size: 20px; }
  .bus-row .eta .num.none   { color: #475569; font-size: 16px; }
  .bus-row .eta .tag {
    font-size: 10px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 4px;
    display: inline-block;
    margin-top: 2px;
  }
  .bus-row .eta .tag.final {
    background: #eab308;
    color: #0f172a;
  }

  .no-service {
    text-align: center;
    padding: 40px 0;
  }
  .no-service .icon { font-size: 40px; margin-bottom: 8px; }
  .no-service .msg { font-size: 18px; color: #64748b; font-weight: 600; }

  .status-bar {
    text-align: center;
    margin-top: 20px;
    font-size: 12px;
    color: #475569;
    display: flex;
    justify-content: center;
    gap: 14px;
  }

  .error-msg { text-align: center; padding: 40px 20px; color: #ef4444; }
  .error-msg button {
    margin-top: 12px; padding: 10px 28px; border-radius: 12px;
    border: none; background: #eab308; color: #0f172a;
    font-weight: 700; font-size: 16px; cursor: pointer;
  }
  .loading { text-align: center; padding: 60px 0; color: #64748b; }
  .loading .spinner {
    width: 48px; height: 48px;
    border: 4px solid #1e293b; border-top-color: #eab308;
    border-radius: 50%; animation: spin 0.8s linear infinite;
    margin: 0 auto 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (prefers-color-scheme: light) {
    body { background: #f8fafc; color: #0f172a; }
    .bus-row { background: #ffffff; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .bus-row .route-tag.late { background: #e2e8f0; color: #64748b; }
    .loading .spinner { border-color: #e2e8f0; border-top-color: #eab308; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="stop-name">
    <div class="badge">🚏 醫療輔助總部</div>
    <h1>即將到站的巴士</h1>
    <div class="clock" id="clock">--:--:--</div>
  </div>

  <div id="app">
    <div class="loading">
      <div class="spinner"></div>
      <div>正在獲取到站資料...</div>
    </div>
  </div>

  <div class="status-bar">
    <span id="status">載入中</span>
    <span>數據: data.gov.hk (KMB)</span>
  </div>
</div>

<script>
const STOP_ID = '66C6FDFC88F56E51';
const API = 'https://data.etabus.gov.hk/v1/transport/kmb';
const HKTZ = 'Asia/Hong_Kong';

const ROUTES = {
  182: { num: '182', destTc: '中環(港澳碼頭)', destEn: 'CENTRAL (MACAO FERRY)', dir: 'O' },
  113: { num: '113', destTc: '堅尼地城(卑路乍灣)', destEn: 'KENNEDY TOWN (BELCHER BAY)', dir: 'O' },
};

function $(id) { return document.getElementById(id); }

function formatETA(etaStr) {
  if (!etaStr) return null;
  const now = new Date();
  const eta = new Date(etaStr);
  const diffSec = Math.floor((eta - now) / 1000);
  if (diffSec < -120) return { text: '已開出', cls: 'departed' };
  if (diffSec <= 60) return { text: '即將到站', cls: 'arriving' };
  const mins = Math.floor(diffSec / 60);
  const cls = mins <= 2 ? 'due' : mins <= 5 ? 'near' : 'far';
  const txt = mins >= 10 ? `${mins}` : `${mins}:${String(diffSec % 60).padStart(2, '0')}`;
  return { text: txt, cls, unit: '分鐘' };
}

function render(allETAs) {
  const app = $('app');

  // Build a flat list of upcoming buses from all routes
  const timeline = [];

  for (const [routeId, info] of Object.entries(ROUTES)) {
    const routeETAs = (allETAs[routeId] || [])
      .filter(e => e.dir === info.dir)
      .sort((a, b) => a.eta_seq - b.eta_seq);

    const isFinal = routeETAs.some(e =>
      (e.rmk_en && e.rmk_en.toLowerCase().includes('final')) ||
      (e.rmk_tc && e.rmk_tc.includes('最後班次'))
    );

    for (const e of routeETAs) {
      const f = formatETA(e.eta);
      if (!f) continue;
      if (f.cls === 'departed') continue;
      timeline.push({
        route: info,
        etaStr: e.eta,
        etaNum: f,
        seq: e.eta_seq,
        isFinal: isFinal && e.eta_seq === 1,
      });
    }
  }

  // Sort by actual arrival time
  timeline.sort((a, b) => new Date(a.etaStr) - new Date(b.etaStr));

  if (timeline.length === 0) {
    app.innerHTML = `
      <div class="no-service">
        <div class="icon">🌙</div>
        <div class="msg">目前沒有班次</div>
      </div>`;
  } else {
    let html = '<div class="bus-list">';
    for (const t of timeline) {
      html += `<div class="bus-row">
        <div class="route-tag${t.etaNum.cls === 'none' ? ' late' : ''}">${t.route.num}</div>
        <div class="dest-info">
          <div class="dest">${t.route.destTc}</div>
          <div class="dest-sub">${t.route.destEn}</div>
        </div>
        <div class="eta">
          <div class="num ${t.etaNum.cls}">
            ${t.etaNum.text}
            ${t.etaNum.unit ? `<span class="unit">${t.etaNum.unit}</span>` : ''}
          </div>
          ${t.isFinal ? '<div class="tag final">🚌 尾班車</div>' : ''}
        </div>
      </div>`;
    }
    html += '</div>';
    app.innerHTML = html;
  }

  $('status').textContent = '✓ ' + new Date().toLocaleTimeString('zh-HK', {
    timeZone: HKTZ, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
  });
}

async function fetchETA(route) {
  const resp = await fetch(`${API}/eta/${STOP_ID}/${route}/${1}`);
  const data = await resp.json();
  return data.data || [];
}

async function update() {
  try {
    $('status').textContent = '更新中...';
    const [eta182, eta113] = await Promise.all([
      fetchETA('182'), fetchETA('113'),
    ]);
    render({ 182: eta182, 113: eta113 });
  } catch (e) {
    $('app').innerHTML = `
      <div class="error-msg">
        <div style="font-size:48px;margin-bottom:12px">😵</div>
        <div>無法獲取到站資料</div>
        <div style="font-size:13px;margin-top:8px;color:#64748b">${e.message}</div>
        <button onclick="update()">重試</button>
      </div>`;
    $('status').textContent = '❌ 錯誤';
  }
}

function updateClock() {
  const now = new Date();
  $('clock').textContent = '🕐 ' + now.toLocaleTimeString('zh-HK', {
    timeZone: HKTZ, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
  });
}

async function init() {
  await update();
  setInterval(update, 30000);
  setInterval(updateClock, 1000);
  updateClock();
}

init();
</script>
</body>
</html>
