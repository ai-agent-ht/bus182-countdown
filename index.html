<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>巴士到站 - 醫療輔助總部</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #0f172a;
    color: #f1f5f9;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    width: 100%;
    max-width: 440px;
  }
  
  /* --- Stop Header --- */
  .stop-name {
    text-align: center;
    margin-bottom: 32px;
  }
  .stop-name .badge {
    font-size: 12px;
    color: #94a3b8;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .stop-name h1 {
    font-size: 24px;
    font-weight: 700;
    margin-top: 4px;
  }
  .stop-name .clock {
    font-size: 14px;
    color: #64748b;
    margin-top: 4px;
    font-variant-numeric: tabular-nums;
  }

  /* --- Route Cards --- */
  .route-card {
    background: #1e293b;
    border-radius: 20px;
    padding: 28px 24px;
    margin-bottom: 16px;
  }
  .route-card:last-child {
    margin-bottom: 0;
  }
  .route-card .top {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .route-card .route-num {
    background: #eab308;
    color: #0f172a;
    font-size: 28px;
    font-weight: 800;
    padding: 4px 16px;
    border-radius: 12px;
    letter-spacing: 1px;
    line-height: 1.2;
  }
  .route-card .route-dest {
    flex: 1;
  }
  .route-card .route-dest .dest {
    font-size: 16px;
    font-weight: 600;
  }
  .route-card .route-dest .dest-sub {
    font-size: 12px;
    color: #64748b;
  }

  /* --- ETA Display --- */
  .eta-area {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .eta-item {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }
  .eta-item .label {
    font-size: 14px;
    color: #94a3b8;
    font-weight: 500;
  }
  .eta-item .eta-min {
    font-size: 48px;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .eta-item .eta-min .unit {
    font-size: 20px;
    font-weight: 600;
    margin-left: 4px;
  }
  .eta-item .eta-min.due {
    color: #22c55e;
  }
  .eta-item .eta-min.near {
    color: #eab308;
  }
  .eta-item .eta-min.far {
    color: #60a5fa;
  }
  .eta-item .eta-min.departed {
    color: #ef4444;
    font-size: 24px;
  }
  .eta-item .eta-min.none {
    color: #475569;
    font-size: 24px;
  }
  .eta-item .eta-min .final-bus {
    font-size: 14px;
    color: #eab308;
    font-weight: 600;
  }
  .next-bus {
    display: flex;
    justify-content: flex-end;
    font-size: 13px;
    color: #64748b;
    margin-top: -4px;
  }

  /* --- Status bar --- */
  .status-bar {
    text-align: center;
    margin-top: 24px;
    font-size: 12px;
    color: #475569;
    display: flex;
    justify-content: center;
    gap: 16px;
  }

  /* --- Error --- */
  .error-msg {
    text-align: center;
    padding: 40px 20px;
    color: #ef4444;
  }
  .error-msg button {
    margin-top: 12px;
    padding: 10px 28px;
    border-radius: 12px;
    border: none;
    background: #eab308;
    color: #0f172a;
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
  }

  .loading {
    text-align: center;
    padding: 60px 0;
    color: #64748b;
  }
  .loading .spinner {
    width: 48px;
    height: 48px;
    border: 4px solid #1e293b;
    border-top-color: #eab308;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (prefers-color-scheme: light) {
    body { background: #f8fafc; color: #0f172a; }
    .route-card { background: #ffffff; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .loading .spinner { border-color: #e2e8f0; border-top-color: #eab308; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="stop-name">
    <div class="badge">🚏 巴士站</div>
    <h1>醫療輔助總部</h1>
    <div class="clock" id="clock">--:--:--</div>
  </div>

  <div id="app">
    <div class="loading">
      <div class="spinner"></div>
      <div>正在獲取到站資料...</div>
    </div>
  </div>

  <div class="status-bar">
    <span id="status">載入中</span>
    <span>數據: data.gov.hk</span>
  </div>
</div>

<script>
const STOP_ID = '66C6FDFC88F56E51';
const API = 'https://data.etabus.gov.hk/v1/transport/kmb';
const HKTZ = 'Asia/Hong_Kong';

const ROUTES = [
  { route: '182', dir: 'O', num: '182', destTc: '中環(港澳碼頭)', destEn: 'CENTRAL (MACAO FERRY)', color: '#eab308' },
  { route: '113', dir: 'O', num: '113', destTc: '堅尼地城(卑路乍灣)', destEn: 'KENNEDY TOWN (BELCHER BAY)', color: '#eab308' },
];

function $(id) { return document.getElementById(id); }

function formatETA(etaStr) {
  if (!etaStr) return { text: '—', cls: 'none', sub: '' };
  const now = new Date();
  const eta = new Date(etaStr);
  const diffSec = Math.floor((eta - now) / 1000);

  if (diffSec < -120) return { text: '已開出', cls: 'departed', sub: '' };
  if (diffSec < 60) return { text: '即將到站', cls: 'due', sub: '' };

  const mins = Math.floor(diffSec / 60);
  let cls = mins <= 2 ? 'due' : mins <= 5 ? 'near' : 'far';
  return { text: mins, cls, sub: '分鐘', isFinal: false };
}

function render(eta182, eta113) {
  const app = $('app');

  const has182 = eta182.length > 0;
  const has113 = eta113.length > 0;

  function buildRouteHTML(rt, etaData) {
    const etas = etaData.filter(e => e.dir === rt.dir);
    const eta1 = etas.find(e => e.eta_seq === 1);
    const eta2 = etas.find(e => e.eta_seq === 2);
    const isFinal = eta1?.rmk_en?.toLowerCase().includes('final') || 
                    eta1?.rmk_tc?.includes('最後班次') || false;

    const f1 = formatETA(eta1?.eta);
    const f2 = formatETA(eta2?.eta);

    const cls1 = isFinal && f1.cls === 'far' ? 'departed' : f1.cls;
    const text1 = isFinal && f1.cls === 'far' ? '已開出 (末班車)' : 
                  isFinal && f1.cls !== 'none' ? `${f1.text}${f1.sub ? `<span class="unit">${f1.sub}</span>` : ''}<div class="final-bus">🚌 末班車</div>` :
                  f1.text !== '—' ? `${f1.text}<span class="unit">${f1.sub}</span>` : f1.text;

    const hasNext = !isFinal && f2.cls !== 'none' && f2.cls !== 'departed';

    return `
      <div class="route-card">
        <div class="top">
          <div class="route-num">${rt.num}</div>
          <div class="route-dest">
            <div class="dest">${rt.destTc}</div>
            <div class="dest-sub">${rt.destEn}</div>
          </div>
        </div>
        <div class="eta-area">
          <div class="eta-item">
            <div class="label">${isFinal ? '🚌 尾班車' : '下一班'}</div>
            <div class="eta-min ${cls1}">${text1}</div>
          </div>
          ${hasNext ? `
          <div class="eta-item">
            <div class="label">再下一班</div>
            <div class="eta-min far">${f2.text}<span class="unit">${f2.sub}</span></div>
          </div>` : ''}
          ${!hasNext && !isFinal && f1.cls !== 'departed' && f1.cls !== 'none' ? '' : ''}
        </div>
      </div>
    `;
  }

  let html = '';
  html += buildRouteHTML(ROUTES[0], eta182);
  html += buildRouteHTML(ROUTES[1], eta113);
  app.innerHTML = html;
}

async function fetchETA(route) {
  const resp = await fetch(`${API}/eta/${STOP_ID}/${route}/${1}`);
  const data = await resp.json();
  return data.data || [];
}

async function update() {
  try {
    $('status').textContent = '更新中...';
    const [eta182, eta113] = await Promise.all([
      fetchETA('182'),
      fetchETA('113'),
    ]);
    render(eta182, eta113);
    $('status').textContent = `✓  ${new Date().toLocaleTimeString('zh-HK', { timeZone: HKTZ, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false })}`;
  } catch (e) {
    $('app').innerHTML = `
      <div class="error-msg">
        <div style="font-size:48px;margin-bottom:12px">😵</div>
        <div>無法獲取到站資料</div>
        <div style="font-size:13px;margin-top:8px;color:#64748b">${e.message}</div>
        <button onclick="update()">重試</button>
      </div>
    `;
    $('status').textContent = '❌ 錯誤';
  }
}

function updateClock() {
  const now = new Date();
  $('clock').textContent = '🕐 ' + now.toLocaleTimeString('zh-HK', {
    timeZone: HKTZ, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
  });
}

async function init() {
  await update();
  setInterval(update, 30000);
  setInterval(updateClock, 1000);
  updateClock();
}

init();
</script>
</body>
</html>
